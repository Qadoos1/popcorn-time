<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movie Hub</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#111;
    color:white;
}

header{
    background:#e50914;
    padding:20px;
    text-align:center;
}

nav{
    background:#222;
    padding:15px;
    text-align:center;
}

nav a{
    color:white;
    text-decoration:none;
    margin:0 15px;
}

.hero{
    text-align:center;
    padding:60px 20px;
    background:url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba') center/cover;
}

.hero h1{
    font-size:3rem;
}

.movies{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:30px;
}

.card{
    background:#222;
    border-radius:10px;
    overflow:hidden;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.05);
}

.card img{
    width:100%;
    height:350px;
    object-fit:cover;
}

.card-content{
    padding:15px;
}

footer{
    text-align:center;
    padding:20px;
    background:#000;
}
</style>
</head>
<body>

<header>
    <h1>🎬 Movie Hub</h1>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Movies</a>
    <a href="#">Reviews</a>
    <a href="#">Categories</a>
    <a href="#">Contact</a>
</nav>

<section class="hero">
    <h1>Welcome to Movie Hub</h1>
    <p>Discover the latest movies, reviews, and trailers.</p>
</section>

<section class="movies">

    <div class="card">
        <img src="https://via.placeholder.com/300x450" alt="Movie">
        <div class="card-content">
            <h2>Movie Title 1</h2>
            <p>Action | Adventure</p>
            <p>⭐ 8.5/10</p>
        </div>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/300x450" alt="Movie">
        <div class="card-content">
            <h2>Movie Title 2</h2>
            <p>Drama | Thriller</p>
            <p>⭐ 8.2/10</p>
        </div>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/300x450" alt="Movie">
        <div class="card-content">
            <h2>Movie Title 3</h2>
            <p>Comedy | Family</p>
            <p>⭐ 7.9/10</p>
        </div>
    </div>

</section>

<footer>
    <p>© 2026 Movie Hub. All Rights Reserved.</p>
</footer>

</body>
</html>
